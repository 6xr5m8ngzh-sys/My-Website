<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Vielen Dank fuer deine Anfrage bei Casa Spirit." />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#0d0b14" />
  <title>Vielen Dank – Casa Spirit</title>
  <link rel="canonical" href="danke.html" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" href="img/logo-192.png" />
  <link rel="apple-touch-icon" href="img/logo-192.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    .thankyou {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .thankyou__symbol {
      font-size: 3rem;
      color: var(--color-primary);
      margin-bottom: 1.5rem;
    }
    .thankyou__title {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      color: var(--color-text);
      margin-bottom: 1rem;
    }
    .thankyou__title em { font-style: italic; color: var(--color-primary); }
    .thankyou__text {
      font-size: 1.05rem;
      color: var(--color-text-muted);
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.75;
    }
  </style>
</head>
<body>

  <nav class="nav scrolled">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        <img src="img/logo-256.png" alt="Casa Spirit Logo" class="nav__logo-img" width="256" height="199" decoding="async" />
      </a>
    </div>
  </nav>

  <main class="thankyou">
    <div>
      <div class="thankyou__symbol">&#10022;</div>
      <h1 class="thankyou__title">Vielen <em>Dank!</em></h1>
      <p class="thankyou__text">
        Vielen Dank für Ihre Anfrage – ich werde mir diese ansehen und mich zeitnah bei Ihnen melden.
      </p>
      <a href="index.html" class="btn btn--primary">Zur Startseite</a>
    </div>
  </main>

</body>
</html>
